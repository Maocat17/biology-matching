* { font-family: 'Noto Sans TC', sans-serif; }
html, body { height: 100%; margin: 0; }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }

.result-overlay { pointer-events: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 50; }
.result-symbol { font-size: 200px; font-weight: 900; opacity: 0.15; }

/* === 懸浮標題欄 - 固定貼頂 + 置中對齊內容 === */
.screen-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background-color: #0f0a1e;
  border-bottom: 1px solid #6b21a8;
  padding: 16px 24px;

  margin-right: auto;
  width: 100%;
}

.screen-header h2 {
  margin: 0;
}

/* === 強制讓 Lucide 返回箭頭清晰顯示 === */
i[data-lucide="arrow-left"] {
  stroke: #ffffff !important;     /* 強制白色 */
  stroke-width: 3 !important;     /* 加粗一點，更明顯 */
  width: 18px !important;
  height: 18px !important;
}

.screen-header button:hover i[data-lucide="arrow-left"],
button:hover i[data-lucide="arrow-left"] {
  stroke: #c4b5fd !important;     /* 懸停時變成亮紫色 */
}

</style>

        ALL_ORGANISMS.push({ name: org, path: [...path, key] });

    } else if (typeof val === 'object' && val !== null) {
      buildOrganisms(val, [...path, key]);

  }
}

// ============ START PRACTICE ============
function startPractice(mode) {
  quizMode = mode;
  wrongThisSession = [];
  correctCount = 0;
  currentIndex = 0;
  quizFinished = false;

  let pool = [];
  if (mode === 'new') {
    const exclude = document.getElementById('check-exclude').checked;
    const count = parseInt(document.getElementById('input-count').value) || 10;
    const filterKingdom = document.getElementById('filter-kingdom').value;
    const filterKeyword = document.getElementById('filter-keyword').value.trim();

    let candidates = [...ALL_ORGANISMS];

    if (filterKingdom) {
      candidates = candidates.filter(o => o.path[0] === filterKingdom);
    }
    if (filterKeyword) {
      candidates = candidates.filter(o => o.name.includes(filterKeyword));
    }

    if (exclude) {
      const practicedNames = new Set(practiceData.filter(r => r.times_practiced > 0).map(r => r.organism));
      pool = candidates.filter(o => !practicedNames.has(o.name));
    } else {
      pool = candidates;
    }

    if (pool.length === 0) { showInlineMsg('符合條件的題目已全部練習過！'); return; }
    shuffle(pool);
    currentQuiz = pool.slice(0, Math.min(count, pool.length));
  }
  else if (mode === 'wrong') {
    const count = parseInt(document.getElementById('wrong-count-input-sticky').value) || 5;

    // 【修正重點】只取出「尚未複習完成」的錯題
    const unreviewedWrong = practiceData
      .filter(r => r.is_wrong === true && r.reviewed !== true)
      .map(r => r.organism);

    pool = ALL_ORGANISMS.filter(o => unreviewedWrong.includes(o.name));

    shuffle(pool);
    currentQuiz = pool.slice(0, Math.min(count, pool.length));
  }
  else if (mode === 'history') {
    if (historySelected.size === 0) { showInlineMsg('請先選擇題目！'); return; }
    pool = ALL_ORGANISMS.filter(o => historySelected.has(o.name));
    shuffle(pool);
    currentQuiz = pool;
  }

  if (currentQuiz.length === 0) return;
  showScreen('screen-quiz');
  showQuestion();
}

// ============ 考卷模式 ============
function startExam(examName) {
  quizMode = 'exam';
  currentExamName = examName;
  wrongThisSession = [];
  correctCount = 0;
  currentIndex = 0;
  quizFinished = false;

  const organismNames = EXAM_PAPERS[examName];
  if (!organismNames) {
    showInlineMsg('找不到此考卷！');
    return;
  }

  let pool = ALL_ORGANISMS.filter(o => organismNames.includes(o.name));
  shuffle(pool);

  currentQuiz = pool;

  if (currentQuiz.length === 0) {
    showInlineMsg('考卷中的生物不存在！');
    return;
  }

  showScreen('screen-quiz');
  showQuestion();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ============ QUIZ LOGIC ============
function showQuestion() {
  const q = currentQuiz[currentIndex];

  if (!q) {
    console.error("找不到題目！");
    return;
  }

  const organismDiv = document.getElementById('organism-name');
  organismDiv.innerHTML = '';
  organismDiv.textContent = q.name;
  organismDiv.className = 'text-2xl font-bold mt-2 text-white text-center';

  // 考卷模式紅色標示
  if (quizMode === 'exam' && currentExamName) {
    const record = getRecord(q.name);
    const wrongCount = record && record.examWrong ? (record.examWrong[currentExamName] || 0) : 0;

    if (wrongCount > 0) {
      organismDiv.classList.add('text-rose-400');

      const badge = document.createElement('div');
      badge.className = 'mx-auto mt-2 text-xs bg-rose-900/80 text-rose-200 px-4 py-1.5 rounded-2xl font-medium inline-flex items-center gap-1';
      badge.innerHTML = `📌 這份考卷錯 <span class="font-bold">${wrongCount}</span> 次`;
      organismDiv.appendChild(badge);
    }
  }

  document.getElementById('quiz-progress').textContent = `${currentIndex + 1} / ${currentQuiz.length}`;
  document.getElementById('quiz-score').textContent = `✓${correctCount}`;
  document.getElementById('progress-bar').style.width = `${((currentIndex) / currentQuiz.length) * 100}%`;

  document.getElementById('result-display').classList.add('hidden');
  document.getElementById('result-overlay').classList.add('hidden');
  document.getElementById('quit-confirm').classList.add('hidden');
  document.getElementById('confirm-buttons').classList.add('hidden');
  document.getElementById('choices-container').classList.remove('hidden');
  document.getElementById('path-chain').innerHTML = '';
  selectedPath = [];

  showStep(0, getChoicesForStep(0));
}

function getChoicesForStep(stepIndex) {
  // Step 0: Five Kingdoms
  if (stepIndex === 0) return Object.keys(TAXONOMY);

  // Navigate into taxonomy based on selectedPath
  let node = TAXONOMY;
  for (let i = 0; i < selectedPath.length; i++) {
    node = node[selectedPath[i]];
    if (!node) return [];
  }
  if (typeof node === 'object' && !Array.isArray(node)) {
    return Object.keys(node);
  }
  return [];
}

const STEP_LABELS = {
  0: '請選擇所屬的界',
};

function getStepLabel(step) {
  if (step === 0) return '請選擇所屬的界';
  // Contextual label
  const last = selectedPath[selectedPath.length - 1];
  if (['無脊索動物','脊索動物'].includes(last)) return '請選擇所屬的門/類';
  if (['被子植物'].includes(last)) return '請選擇單子葉或雙子葉';
  if (['軟體動物門','節肢動物門'].includes(last)) return '請選擇所屬的綱/類';
  if (step === 1) return '請選擇所屬的分類';
  return '請選擇下一層分類';
}

function showStep(step, choices) {
  const container = document.getElementById('choices-container');
  container.innerHTML = '';
  document.getElementById('step-label').textContent = getStepLabel(step);

  const colors = [
    'from-purple-600/80 to-purple-700/80 hover:from-purple-500 hover:to-purple-600',
    'from-indigo-600/80 to-indigo-700/80 hover:from-indigo-500 hover:to-indigo-600',
    'from-violet-600/80 to-violet-700/80 hover:from-violet-500 hover:to-violet-600',
    'from-fuchsia-600/80 to-fuchsia-700/80 hover:from-fuchsia-500 hover:to-fuchsia-600',
    'from-blue-600/80 to-blue-700/80 hover:from-blue-500 hover:to-blue-600',
  ];

  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = `btn-choice px-4 py-2.5 rounded-xl bg-gradient-to-r ${colors[i % colors.length]} font-semibold text-sm text-white fade-in`;
    btn.textContent = c;
    btn.onclick = () => selectChoice(c);
    container.appendChild(btn);
  });
}

function selectChoice(choice) {
  if (isAnswering) return; // Prevent multiple clicks during selection

  selectedPath.push(choice);

  const q = currentQuiz[currentIndex];

  // Update path display
  const chain = document.getElementById('path-chain');
  chain.innerHTML = selectedPath.map((p, i) =>
    `<span class="bg-purple-900/50 px-2 py-0.5 rounded-lg">${p}</span>${i < selectedPath.length - 1 ? '<span class="text-[#a78bbd]">›</span>' : ''}`
  ).join('');



  // Check if there are more levels
  let node = TAXONOMY;
  for (const p of selectedPath) {
    node = node[p];
    if (!node) break;
  }

  if (node && typeof node === 'object' && !Array.isArray(node)) {
    // More levels
    showStep(selectedPath.length, Object.keys(node));
  } else {
    // Reached leaf
    showPathAndConfirm();
  }
}

function showPathAndConfirm() {
  // Disable all choice buttons
  document.querySelectorAll('.btn-choice').forEach(btn => {
    btn.disabled = true;
    btn.classList.add('opacity-50', 'cursor-not-allowed');
  });

  // Show confirm buttons now
  document.getElementById('confirm-buttons').classList.remove('hidden');
  document.getElementById('reset-button-sticky').classList.remove('hidden');
  const chain = document.getElementById('path-chain');
  chain.innerHTML = selectedPath.map((p, i) =>
    `<span class="bg-purple-900/50 px-2 py-0.5 rounded-lg">${p}</span>${i < selectedPath.length - 1 ? '<span class="text-[#a78bbd]">›</span>' : ''}`
  ).join('');
}

function resetSelection() {
  // Re-enable all choice buttons
  document.querySelectorAll('.btn-choice').forEach(btn => {
    btn.disabled = false;
    btn.classList.remove('opacity-50', 'cursor-not-allowed');
  });

  selectedPath = [];
  document.getElementById('path-chain').innerHTML = '';
  document.getElementById('confirm-buttons').classList.add('hidden');
  showStep(0, getChoicesForStep(0));
}

async function confirmAnswer() {
  if (isAnswering) return; // Prevent multiple submissions
  isAnswering = true;

  const q = currentQuiz[currentIndex];
  const correctPath = q.path;
  const isCorrect = JSON.stringify(selectedPath) === JSON.stringify(correctPath);

  if (isCorrect) {
    correctCount++;
  } else {
    wrongThisSession.push({ name: q.name, userPath: [...selectedPath], correctPath });
  }

  // Hide choices and path selection immediately
  document.getElementById('choices-container').classList.add('hidden');
  document.getElementById('confirm-buttons').classList.add('hidden');

  // Show result with comparison immediately (no await)
  document.getElementById('path-display').classList.remove('hidden');

    ).join('');
  } else {
    correctBox.classList.add('hidden');
  }

  document.getElementById('quiz-score').textContent = `✓${correctCount}`;

  // Show next button in sticky area
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentIndex < currentQuiz.length - 1 ? '下一題' : '查看結果';
  btnNext.classList.remove('hidden');
  const resetBtn = document.querySelectorAll('[onclick="resetSelection()"]')[1];
  if (resetBtn) resetBtn.classList.add('hidden');

  // Update data
  updateOrgRecord(q.name, isCorrect);

  isAnswering = false;
}

function updateOrgRecord(orgName, isCorrect) {
  let record = getRecord(orgName);
  if (!record) {
    record = {
      organism: orgName,
      times_practiced: 0,
      times_wrong: 0,
      is_wrong: false,
      reviewed: false,
      examWrong: {},
      last_practiced: new Date().toISOString()
    };
    practiceData.push(record);
  }

  record.times_practiced = (record.times_practiced || 0) + 1;
  record.last_practiced = new Date().toISOString();

  if (!isCorrect) {
    record.times_wrong = (record.times_wrong || 0) + 1;
    record.is_wrong = true;
    record.reviewed = false;

    // 【新功能】如果是考卷模式，累計這份考卷的錯題次數
    if (quizMode === 'exam' && currentExamName) {
      record.examWrong = record.examWrong || {};
      record.examWrong[currentExamName] = (record.examWrong[currentExamName] || 0) + 1;
    }
  } else {
    if (quizMode === 'wrong') {
      record.reviewed = true;
    }
  }

  saveData();
  updateHomeStats();
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= currentQuiz.length) {
    showResults();
  } else {
    // Reset button state for next question
    const btnNext = document.getElementById('btn-next');
    btnNext.classList.add('hidden');
    const resetBtn = document.querySelectorAll('[onclick="resetSelection()"]')[1];
    if (resetBtn) resetBtn.classList.remove('hidden');

    showQuestion();
  }
}

function showResults() {
  quizFinished = true;
  showScreen('screen-result');

  const total = currentQuiz.length;
  const pct = Math.round((correctCount / total) * 100);

  document.getElementById('result-emoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📖';

  let titleText = `${correctCount} / ${total} 正確`;
  if (quizMode === 'exam') {
    titleText = `${titleText}`;
  }

  document.getElementById('result-title').textContent = titleText;
  document.getElementById('result-summary').textContent = `正確率 ${pct}%`;

  const list = document.getElementById('wrong-list-result');
  list.innerHTML = '';
  if (wrongThisSession.length > 0) {
    const hdr = document.createElement('div');
    hdr.className = 'text-sm font-semibold text-red-400 mb-1';
    hdr.textContent = `錯題 (${wrongThisSession.length})`;
    list.appendChild(hdr);
    wrongThisSession.forEach(w => {
      const item = document.createElement('div');
      item.className = 'bg-[#1a1230] rounded-xl p-3 border border-red-900/30 fade-in';
      item.innerHTML = `
        <div class="font-semibold text-white text-sm">${w.name}</div>
        <div class="text-xs text-[#a78bbd] mt-1">你的選擇：${w.userPath.join(' › ')}</div>
        <div class="text-xs text-green-400 mt-0.5">正確答案：${w.correctPath.join(' › ')}</div>
      `;
      list.appendChild(item);
    });
  }
  document.getElementById('progress-bar').style.width = '100%';
}

// ============ WRONG BOOK ============
function showWrongBook() {
  showScreen('screen-wrong');
  const allWrong = practiceData.filter(r => r.is_wrong === true);

  // 未複習的排在前面，已複習的排在後面
  const unreviewed = allWrong.filter(r => !r.reviewed);
  const reviewed = allWrong.filter(r => r.reviewed);
  const wrongOrgs = [...unreviewed, ...reviewed];   // 未複習優先

  const list = document.getElementById('wrong-book-list');
  list.innerHTML = '';

  if (wrongOrgs.length === 0) {
    document.getElementById('wrong-empty').classList.remove('hidden');
    document.getElementById('wrong-count-section').classList.add('hidden');
    document.getElementById('wrong-practice-sticky').classList.add('hidden');
    return;
  }

  document.getElementById('wrong-empty').classList.add('hidden');
  document.getElementById('wrong-count-section').classList.add('hidden');
  document.getElementById('wrong-practice-sticky').classList.remove('hidden');

  // 【重要】要複習的總題數只算「未複習」的
  const unreviewedCount = unreviewed.length;
  const wrongCountInputSticky = document.getElementById('wrong-count-input-sticky');
  wrongCountInputSticky.max = unreviewedCount;
  wrongCountInputSticky.value = Math.min(5, unreviewedCount || 0);
  document.getElementById('wrong-max-sticky').textContent = unreviewedCount;

  updateWrongStickyCount();

  wrongOrgs.forEach(r => {
    const org = ALL_ORGANISMS.find(o => o.name === r.organism);
    if (!org) return;

    const isReviewed = !!r.reviewed;

    const item = document.createElement('div');
    item.className = `rounded-xl p-3 border fade-in transition-all ${
      isReviewed
        ? 'bg-gray-900/50 border-gray-700'
        : 'bg-[#1a1230] border-red-900/30'
    }`;

    item.innerHTML = `
      <div class="flex justify-between items-center">
        <span class="font-semibold text-sm ${isReviewed ? 'text-gray-400 line-through' : 'text-white'}">
          ${r.organism}
        </span>
        <span class="text-xs ${isReviewed ? 'text-gray-500' : 'text-[#a78bbd]'}">
          錯 ${r.times_wrong} 次
        </span>
      </div>
      <div class="text-xs mt-1 ${isReviewed ? 'text-gray-500' : 'text-green-400/70'}">
       ${org.path.join(' › ')}
      </div>
      ${isReviewed ? `<div class="text-[10px] text-gray-500 mt-1">✓ 已複習完成</div>` : ''}
    `;

    list.appendChild(item);
  });
}

function updateWrongStickyCount() {
  const count = parseInt(document.getElementById('wrong-count-input-sticky').value) || 5;
  document.getElementById('wrong-sticky-count').textContent = `(${count})`;
}

document.addEventListener('DOMContentLoaded', function() {
  const wrongInput = document.getElementById('wrong-count-input-sticky');
  if (wrongInput) {
    wrongInput.addEventListener('change', updateWrongStickyCount);
    wrongInput.addEventListener('input', updateWrongStickyCount);
  }
  // Initialize home screen on load
  updateHomeStats();
});

// ============ HISTORY ============
function showHistory() {
  showScreen('screen-history');
  historySelected.clear();
  const practiced = practiceData.filter(r => r.times_practiced > 0);
  practiced.sort((a, b) => {
    const rateA = a.times_practiced > 0 ? ((a.times_practiced - a.times_wrong) / a.times_practiced) : 0;
    const rateB = b.times_practiced > 0 ? ((b.times_practiced - b.times_wrong) / b.times_practiced) : 0;
    return rateA - rateB;
  });

  const list = document.getElementById('history-list');
  list.innerHTML = '';

  if (practiced.length === 0) {
    document.getElementById('history-empty').classList.remove('hidden');
    document.getElementById('history-practice-sticky').classList.add('hidden');
    return;
  }
  document.getElementById('history-empty').classList.add('hidden');
  document.getElementById('history-practice-sticky').classList.remove('hidden');

  practiced.forEach(r => {
    const rate = r.times_practiced > 0 ? Math.round(((r.times_practiced - r.times_wrong) / r.times_practiced) * 100) : 0;
    const rateColor = rate >= 80 ? 'text-green-400' : rate >= 50 ? 'text-yellow-400' : 'text-red-400';
    const item = document.createElement('div');
    item.className = 'bg-[#1a1230] rounded-xl p-3 border border-purple-900/30 fade-in flex items-center gap-3 cursor-pointer hover:bg-[#1e1538] transition-colors';
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.className = 'accent-purple-500 w-4 h-4 rounded shrink-0 hist-check';
    checkbox.dataset.org = r.organism;

    const contentDiv = document.createElement('div');
    contentDiv.className = 'flex-1 min-w-0';
    contentDiv.innerHTML = `
      <div class="font-semibold text-white text-sm truncate">${r.organism}</div>
      <div class="text-xs text-[#a78bbd]">練 ${r.times_practiced} 次 · 錯 ${r.times_wrong} 次</div>
    `;

    const rateSpan = document.createElement('span');
    rateSpan.className = `text-sm font-bold ${rateColor} shrink-0`;
    rateSpan.textContent = `${rate}%`;

    item.appendChild(checkbox);
    item.appendChild(contentDiv);
    item.appendChild(rateSpan);

    const toggleCheckbox = () => {
      checkbox.checked = !checkbox.checked;
      if (checkbox.checked) historySelected.add(r.organism);
      else historySelected.delete(r.organism);
      updateHistoryStickyCount();
    };

    item.addEventListener('click', toggleCheckbox);
    checkbox.addEventListener('click', (e) => e.stopPropagation());

    list.appendChild(item);
  });
}

function updateHistoryStickyCount() {
  const count = historySelected.size;
  document.getElementById('history-sticky-count').textContent = `(${count})`;
}

function applyHistoryFilter() {
  const rateInput = document.getElementById('history-filter-rate').value;
  const timesInput = document.getElementById('history-filter-times').value;
  const rateLimit = rateInput ? parseInt(rateInput) : null;
  const timesLimit = timesInput ? parseInt(timesInput) : null;

  historySelected.clear();
  const checkboxes = document.querySelectorAll('.hist-check');

  checkboxes.forEach(cb => {
    const orgName = cb.dataset.org;
    const record = practiceData.find(r => r.organism === orgName);
    if (!record) return;

    const rate = record.times_practiced > 0 ? ((record.times_practiced - record.times_wrong) / record.times_practiced) * 100 : 0;
    const passesRateFilter = rateLimit === null || rate < rateLimit;
    const passesTimesFilter = timesLimit === null || record.times_practiced <= timesLimit;

    if (passesRateFilter && passesTimesFilter) {
      historySelected.add(orgName);
      cb.checked = true;
    } else {
      cb.checked = false;
    }
  });

  updateHistoryStickyCount();
}

function historySelectAll() {
  historySelected.clear();
  document.querySelectorAll('.hist-check').forEach(cb => {
    cb.checked = true;
    historySelected.add(cb.dataset.org);
  });
  updateHistoryStickyCount();
}

function historyClearAll() {
  historySelected.clear();
  document.querySelectorAll('.hist-check').forEach(cb => {
    cb.checked = false;
  });
  updateHistoryStickyCount();
}

function clearAllData() {
  if (confirm('確定要刪除所有練習紀錄嗎？這將會清除錯題本與練習次數，且無法恢復。')) {
    practiceData = [];
    saveData();
    updateHomeStats();
    showHistory();
  }
}

// ============ QUIT CONFIRM ============
function confirmQuit() {
  document.getElementById('quit-confirm').classList.remove('hidden');
}
function cancelQuit() {
  document.getElementById('quit-confirm').classList.add('hidden');
}

// ============ INLINE MSG ============
function showInlineMsg(msg) {
  const el = document.getElementById('remaining-count');
  el.textContent = msg;
  el.classList.add('text-yellow-400');
  setTimeout(() => { el.classList.remove('text-yellow-400'); updateHomeStats(); }, 2000);
}

// ============ ELEMENT SDK ============
const defaultConfig = {
  app_title: '生物分類配對練習',
  background_color: '#0f0a1e',
  surface_color: '#1a1230',
  text_color: '#e8e0f0',
  accent_color: '#7c3aed',
  secondary_color: '#a78bbd',
  font_family: 'Noto Sans TC',
  font_size: 16
};

window.elementSdk.init({
  defaultConfig,
  async onConfigChange(config) {
    const t = config.app_title || defaultConfig.app_title;
    const bg = config.background_color || defaultConfig.background_color;
    const sf = config.surface_color || defaultConfig.surface_color;
    const tx = config.text_color || defaultConfig.text_color;
    const ac = config.accent_color || defaultConfig.accent_color;
    const sc = config.secondary_color || defaultConfig.secondary_color;
    const ff = config.font_family || defaultConfig.font_family;
    const fs = config.font_size || defaultConfig.font_size;

    document.getElementById('main-title').textContent = t;
    document.body.style.backgroundColor = bg;
    document.body.style.color = tx;
    document.body.style.fontFamily = `${ff}, sans-serif`;
    document.body.style.fontSize = `${fs}px`;

    document.querySelectorAll('.bg-\\[\\#1a1230\\]').forEach(el => el.style.backgroundColor = sf);
  },
  mapToCapabilities(config) {
    const mk = (key) => ({
      get: () => config[key] || defaultConfig[key],
      set: (v) => { config[key] = v; window.elementSdk.setConfig({ [key]: v }); }
    });
    return {
      recolorables: [mk('background_color'), mk('surface_color'), mk('text_color'), mk('accent_color'), mk('secondary_color')],
      borderables: [],
      fontEditable: mk('font_family'),
      fontSizeable: mk('font_size')
    };
  },
  mapToEditPanelValues(config) {
    return new Map([['app_title', config.app_title || defaultConfig.app_title]]);
  }
});

lucide.createIcons();
</script>
